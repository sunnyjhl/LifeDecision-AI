<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeDecision AI - Agentic Life Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>LifeDecision AI</h1>
    <p>Simulate future outcomes based on your decisions.</p>
    
    <div class="input-section">
      <input type="text" id="decisionInput" placeholder="e.g., Should I do MBA or job?">
      <button onclick="simulateDecision()">Simulate</button>
    </div>
    
    <div id="results" class="results hidden">
      <div class="comparison-cards">
        <!-- Decision comparison cards -->
      </div>
      <div class="timeline">
        <h3>Timeline Visualization</h3>
        <canvas id="timelineCanvas"></canvas>
      </div>
      <div class="agent-steps">
        <h3>Agent Steps</h3>
        <ul id="agentList"></ul>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
